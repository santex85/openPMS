# Production-oriented stack (templates — set secrets via .env.production, never commit real values).
#
# Checklist:
# - Strong POSTGRES_PASSWORD, JWT_SECRET, CORS_ORIGINS
# - TLS only to the internet (Caddy terminates HTTPS; API is not exposed publicly)
# - Regular backups (see scripts/backup_pg_to_s3.sh)
#
# Traefik is an alternative reverse proxy; replace the caddy service with Traefik + labels on `api`
# if your ops standard is Traefik.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openpms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openpms}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openpms} -d ${POSTGRES_DB:-openpms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openpms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openpms}
      CELERY_BROKER_URL: redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  worker:
    build: .
    restart: unless-stopped
    command: celery -A app.worker:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openpms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openpms}
      CELERY_BROKER_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker:celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN for TLS}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

volumes:
  pg_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
