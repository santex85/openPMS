services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openpms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openpms}
      POSTGRES_DB: ${POSTGRES_DB:-openpms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openpms} -d ${POSTGRES_DB:-openpms}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openpms}:${POSTGRES_PASSWORD:-openpms}@db:5432/${POSTGRES_DB:-openpms}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
