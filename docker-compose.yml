services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openpms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openpms}
      POSTGRES_DB: ${POSTGRES_DB:-openpms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openpms} -d ${POSTGRES_DB:-openpms}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openpms}:${POSTGRES_PASSWORD:-openpms}@db:5432/${POSTGRES_DB:-openpms}
      # HS256 requires min 32 chars (see app/core/config.py).
      JWT_SECRET: ${JWT_SECRET:-openpms-dev-jwt-secret-min-32-chars!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
