[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    slow: tests that are heavier or may be sensitive to timing (run with pytest -m slow)
    integration: requires local CSV (MIG_SATVA_DIR) and/or OpenPMS (MIG_OPENPMS_* env vars)
filterwarnings =
    ignore::DeprecationWarning
