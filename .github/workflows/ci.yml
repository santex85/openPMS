name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check app tests
      - name: Ruff format check
        run: ruff format --check app tests

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openpms
          POSTGRES_PASSWORD: openpms
          POSTGRES_DB: openpms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openpms -d openpms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://openpms:openpms@127.0.0.1:5432/openpms_test
      JWT_SECRET: ci-jwt-secret-key-at-least-32-characters!!

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Alembic upgrade
        run: alembic upgrade head
      - name: Pytest with coverage
        run: pytest -q --tb=short --cov=app --cov-config=pyproject.toml --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t openpms-api:ci .
